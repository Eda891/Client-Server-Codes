        var a = new Array(10);
        for (var i = 0; i < a.length; i++) {
            a[i] = Math.floor(1 + Math.random() * 5);
        }
        function button_clicked(){
            var number;
            number = parseInt(document.getElementById("inpValue").value); 
            element = a.indexOf(number);
            if (element == -1) {
                document.getElementById("output").innerHTML = "Does not EXIST";
            }
            else {
                document.getElementById("output").innerHTML = "I found the element at index  " +  element;
            }
            /*document.getElementById("output").innerHTML = a.indexOf(number);*/
        }
        function main() {
            document.getElementById("SButton").addEventListener("click",button_clicked,false);
        }
        window.addEventListener("load", main, false);
    </script>
