<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
    <script>
        var row = 10;
        var column;
        while (row >= 1) {
            column = 1;
            document.writeln("<p>");
            while (column <= 10) {
                document.write(row % 2 == 1 ? "<" : ">");
                ++column;
            }
            --row;
            document.writeln("</p>");
        }
    </script>
</head>
<body>

</body>
</html>
